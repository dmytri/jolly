# A featured collection for Paper's storefront merchandising.
collections:
  - name: "Crew Favorites"
    description: "What every well-equipped pirate carries aboard."
    # Paper's homepage renders the collection with slug `featured-products`
    # (src/lib/catalog/get-featured-products.ts). Keep this slug so the storefront
    # home page shows products out of the box.
    slug: featured-products
    products:
      - the-jolly
      - cutlass
      - brass-spyglass
      - tricorne-hat
      - jolly-roger-flag
    channelListings:
      - channelSlug: us
        isPublished: true

menus:
  - name: Main Navigation
    # Paper renders the navbar from the menu with slug `navbar`
    # (src/lib/menus/get-menu-data.ts → getNavbarMenuItems). Use that slug so the
    # storefront navigation shows our categories, not Saleor's sample menu.
    slug: navbar
    items:
      - name: Weapons
        category: weapons
      - name: Navigation
        category: navigation
      - name: Apparel
        category: apparel
      - name: Treasure
        category: treasure
      - name: Ship Supplies
        category: ship-supplies
      - name: Crew Favorites
        collection: featured-products
