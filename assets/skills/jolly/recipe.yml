# Jolly starter recipe — a @saleor/configurator config that turns a freshly
# created Saleor Cloud environment into a working, browsable, checkout-ready
# storefront for the Paper template. Playful pirate-themed demo catalog, single
# US / USD / English market (v1).
#
# This file ships with the Jolly skill. `jolly start` writes it to `recipe.yml` in
# the project working dir and spawns the official Configurator to deploy it
# directly, gated by Jolly's approval gate (which serves as the preview):
#
#   npx @saleor/configurator deploy --url "$SALEOR_URL" \
#       --token "$SALEOR_TOKEN" --config recipe.yml
#
# (Configurator auto-loads .env and reads SALEOR_URL/SALEOR_TOKEN, so the bare
# `npx @saleor/configurator deploy` also works once Jolly has written them.)
#
# `--failOnDelete` is added only when re-deploying over a pre-existing foreign
# catalog; it is omitted on the blank-store bootstrap path so the recipe can
# replace the stock placeholders a fresh Saleor environment ships. As an explicit
# MANUAL alternative you can copy this file into the storefront repo as
# `saleor-config.yml` (version-controlled, reviewable) and run a `diff`-then-
# `deploy` workflow yourself.
#
# Then point the Paper storefront at this channel: NEXT_PUBLIC_DEFAULT_CHANNEL=us
#
# Customize freely — rename the shop, swap in your own catalog. If Configurator
# rejects a field, re-check its current example.yml schema; the tool owns the
# specifics, this recipe owns the starting point.

shop:
  defaultMailSenderName: "Jolly Roger Outfitters"
  displayGrossPrices: true
  trackInventoryByDefault: false        # demo catalog sells without stock counts
  defaultWeightUnit: KG

# Single US / USD market. CHARGE flow so test-mode Stripe captures immediately.
channels:
  - name: United States
    slug: us
    currencyCode: USD
    defaultCountry: US
    isActive: true
    settings:
      automaticallyConfirmAllNewOrders: true
      markAsPaidStrategy: TRANSACTION_FLOW
      defaultTransactionFlowStrategy: CHARGE
    taxConfiguration:
      taxCalculationStrategy: FLAT_RATES
      chargeTaxes: false
      displayGrossPrices: true
      pricesEnteredWithTax: true

# One simple shippable product type — no custom attributes to keep the happy
# path robust. Add attributes/variants later when you customize.
productTypes:
  - name: Pirate Goods
    isShippingRequired: true

categories:
  - name: Weapons
    slug: weapons
  - name: Navigation
    slug: navigation
  - name: Apparel
    slug: apparel
  - name: Treasure
    slug: treasure
  - name: Ship Supplies
    slug: ship-supplies

warehouses:
  - name: Port Royal Warehouse
    slug: port-royal
    email: quartermaster@jolly.example
    isPrivate: false
    clickAndCollectOption: DISABLED
    address:
      streetAddress1: "1 Mallory Square"
      city: Key West
      postalCode: "33040"
      country: US
      countryArea: FL
      companyName: "Jolly Roger Outfitters"

# A default US shipping zone so checkout can reach the payment step.
shippingZones:
  - name: United States
    description: "Shipping within the United States"
    default: true
    countries:
      - US
    warehouses:
      - port-royal
    channels:
      - us
    shippingMethods:
      - name: Standard Shipping
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 7
        channelListings:
          - channel: us
            price: 5.00
            minimumOrderPrice: 0
      - name: Free Shipping
        type: PRICE
        minimumDeliveryDays: 5
        maximumDeliveryDays: 10
        channelListings:
          - channel: us
            price: 0
            minimumOrderPrice: 50

